<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <rect width="200" height="200" fill="white"/>
  <!-- Horizon line / sea waves -->
  <path d="M10 140 Q30 130 50 140 Q70 150 90 140 Q110 130 130 140 Q150 150 170 140 Q185 134 190 140 L190 170 Q170 160 150 170 Q130 180 110 170 Q90 160 70 170 Q50 180 30 170 Q15 163 10 170 Z" fill="#cc0000"/>
  <!-- Sun circle -->
  <circle cx="100" cy="110" r="45" fill="#cc0000"/>
  <!-- Sun rays -->
  <g stroke="#cc0000" stroke-width="6" stroke-linecap="round">
    <line x1="100" y1="20" x2="100" y2="50"/>
    <line x1="148" y1="35" x2="130" y2="58"/>
    <line x1="170" y1="78" x2="148" y2="87"/>
    <line x1="52" y1="35" x2="70" y2="58"/>
    <line x1="30" y1="78" x2="52" y2="87"/>
    <line x1="175" y1="110" x2="148" y2="110"/>
    <line x1="25" y1="110" x2="52" y2="110"/>
  </g>
  <!-- Inner sun highlight -->
  <circle cx="100" cy="110" r="30" fill="white" opacity="0.15"/>
  <circle cx="100" cy="110" r="15" fill="white" opacity="0.2"/>
  <!-- DMK text -->
  <text x="100" y="190" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#333">DMK</text>
</svg>
